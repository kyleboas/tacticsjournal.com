<div class="r-waitlist-form">
  <form
    action="https://buttondown.com/api/emails/embed-subscribe/TacticsJournal"
    method="post"
    target="_blank"
    rel="noopener"
    data-subscribe-form
  >
    <input type="hidden" name="tag" value="research-waitlist" />
    <input type="hidden" name="embed" value="1" />
    <input
      type="email"
      name="email"
      placeholder="Your email"
      required
      aria-label="Email address"
      data-subscribe-email
    />
    <button type="submit" data-subscribe-button>Join Waitlist</button>
  </form>
</div>
