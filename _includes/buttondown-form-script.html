<script>
(() => {
  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  document.querySelectorAll("[data-subscribe-form]").forEach((form) => {
    const emailInput = form.querySelector("[data-subscribe-email]");
    const button = form.querySelector("[data-subscribe-button]");

    if (!emailInput || !button) {
      return;
    }

    const revealOnValid = form.hasAttribute("data-reveal-button");

    const syncButton = () => {
      if (!revealOnValid) {
        return;
      }

      if (emailPattern.test(emailInput.value.trim())) {
        button.classList.add("show");
      } else {
        button.classList.remove("show");
      }
    };

    if (revealOnValid) {
      emailInput.addEventListener("input", syncButton);
      syncButton();
    }

    form.addEventListener("submit", () => {
      window.setTimeout(() => {
        emailInput.value = "";
        button.classList.remove("show");
      }, 100);
    });
  });
})();
</script>
