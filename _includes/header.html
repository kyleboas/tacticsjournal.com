{% assign current_path = page.url | default: "/" %}
{% assign on_research = false %}
{% if current_path == "/research/" or current_path contains "/research/" %}
  {% assign on_research = true %}
{% endif %}

<header class="site-header">
  <a href="{{ site.baseurl }}/" class="site-logo" aria-label="Tactics Journal home">
    <img src="{{ site.avatar }}" alt="Tactics Journal" />
  </a>

  <nav class="site-nav" aria-label="Primary">
    <a href="{{ site.baseurl }}/" {% unless on_research %}class="active"{% endunless %}>Opinion</a>
    <a href="{{ site.baseurl }}/research/" {% if on_research %}class="active"{% endif %}>Research</a>
    <span class="site-nav-divider"></span>
    <a href="{{ site.baseurl }}/archive/">Archive</a>
    <a href="{{ site.baseurl }}/about/">About</a>
    <a href="{{ site.baseurl }}/follow/">Follow</a>
    <a href="{{ site.baseurl }}/contact/">Contact</a>
  </nav>

  <div class="site-actions">
    <a href="{{ site.baseurl }}/search/" class="site-action" aria-label="Search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6.5"/><path d="M16 16L21 21"/></svg>
    </a>

    <a href="{{ site.baseurl }}/subscribe/" class="site-action" aria-label="Subscribe">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c1.5-3.5 4.1-5.25 7-5.25S17.5 16.5 19 20"/></svg>
    </a>

    <details class="site-menu">
      <summary class="site-action" aria-label="Menu">
        <svg viewBox="0 0 24 24"><path d="M4 8h16"/><path d="M4 16h16"/></svg>
      </summary>
      <div class="site-menu-panel">
        <a href="{{ site.baseurl }}/archive/">Archive</a>
        <a href="{{ site.baseurl }}/about/">About</a>
        <a href="{{ site.baseurl }}/follow/">Follow</a>
        <a href="{{ site.baseurl }}/contact/">Contact</a>
        <a href="{{ site.baseurl }}/recommended/">Recommended</a>
        <a href="{{ site.baseurl }}/key/">Key</a>
      </div>
    </details>
  </div>
</header>
